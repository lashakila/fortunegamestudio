<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fortune Game Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <header class="header">
    <div class="header-inner">
      <a class="logo" aria-label="Fortune Game Studio">
        <span class="logo-icon">&#9830;</span>
        Fortune Game Studio
      </a>
      <nav class="nav">
        <a class="nav-link active" aria-disabled="true">Home</a>
        <a class="nav-link" href="/games/">Games</a>
        <a class="nav-link" aria-disabled="true">About Us</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-content">
        <h1 class="hero-title">
          <span class="hero-title-line">Where Fortune</span>
          <span class="hero-title-line accent">Meets Innovation</span>
        </h1>
        <p class="hero-tagline">Crafting next-generation casino experiences with cutting-edge technology and stunning visuals.</p>
        <div class="hero-chips">
          <span class="chip"></span>
          <span class="chip"></span>
          <span class="chip"></span>
        </div>
      </div>
      <div class="hero-glow"></div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
